<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!--Font Awesome CDN-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!--DaisyUI + Tailwind-->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC] min-h-screen">
    <header>
      <nav class="bg-white">
        <div
          class="navbar bg-white shadow-sm px-18 flex flex-col items-start md:flex-row gap-4"
        >
          <div class="flex flex-1 items-center gap-2">
            <!--Home page logo-->
            <div class="max-w-[36px]">
              <img src="./assets/github-logo.png" alt="github-logo" />
            </div>
            <h3 class="text-2xl font-semibold">GitHub Issues Tracker</h3>
          </div>
          <div class="flex gap-2 items-center">
            <input
              type="text"
              placeholder="Search issues..."
              class="input input-bordered w-24 md:w-auto"
            />
            <div class="">
              <button class="btn btn-primary">
                <i class="fa-solid fa-plus"></i> New Issue
              </button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <!--Buttons Section-->
    <section class="container mx-auto mt-[60px] p-4">
      <div class="card bg-base-100 w-full shadow-sm">
        <div class="card-body">
          <div class="w-1/3 flex flex-row gap-2">
            <button class="btn btn-primary flex-1">All</button>
            <button class="btn btn-outline btn-primary flex-1">Open</button>
            <button class="btn btn-outline btn-primary flex-1">Closed</button>
          </div>
        </div>
      </div>
    </section>

    <!--Issue section-->
    <section class="container mx-auto mb-[16px] p-4">
      <div class="card bg-base-100 w-full shadow-sm">
        <div class="card-body">
          <div
            class="navbar bg-base-100 justify-between flex-col gap-6 items-start sm:flex-row sm:items-center"
          >
            <div class="flex items-center gap-2">
              <div
                class="bg-[#ECE4FF] rounded-full w-12 h-12 flex items-center justify-center"
              >
                <img src="./assets/Aperture.png" alt="aperture-logo" />
              </div>
              <div>
                <p class="text-xl font-semibold">
                  <span id="totalIssues">50</span> Issues
                </p>
                <p class="text-[#64748B]">
                  Track and manage your project issues
                </p>
              </div>
            </div>
            <div class="flex gap-4">
              <div class="flex items-center gap-2">
                <div class="rounded-full bg-green-600 w-3 h-3"></div>
                <p class="font-medium">Open</p>
              </div>
              <div class="flex items-center gap-2">
                <div class="rounded-full bg-purple-700 w-3 h-3"></div>
                <p class="font-medium">Closed</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!--Cards Section-->
    <section class="container mx-auto p-4">
      <div id="cards-container" class="card bg-base-300 w-full shadow-sm p-6 grid grid-cols-1 gap-4 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">
        <div class="card bg-base-100 shadow-sm border-t-[#00A96E] border-t-4">
          <div class="card-body">
            <div class="flex justify-between">
              <img src="./assets/Open-Status.png" alt="open" />
              <div class="badge badge-soft badge-error">High</div>
            </div>
            <h4 class="text-sm font-semibold">
              Fix navigation menu on mobile devices
            </h4>
            <p class="text-[#64748B] text-xs mb-[12px]">
              The navigation menu doesn't collapse properly on mobile devices...
            </p>
            <div>
              <div class="badge badge-soft badge-error"><img src="./assets/BugDroid.png">BUG</div>
              <div class="badge badge-soft badge-warning"><img src="./assets/Lifebuoy.png">HELP WANTED</div>
            </div>
          </div>
          <hr class="text-[#E4E4E7]" />
          <div class="card-body">
            <p class=" text-[#64748B] text-xs">
              #1 by john_doe
            </p>
            <p class=" text-[#64748B] text-xs">
              1/15/2024
            </p>
          </div>
        </div>
      </div>
    </section>
    <script src="script/home.js"></script>
  </body>
</html>
