<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!--Font Awesome CDN-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!--DaisyUI + Tailwind-->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <div class="navbar bg-base-100 shadow-sm px-18 flex flex-col md:flex-row gap-4">
          <div class="flex flex-1 items-center gap-2">
            <!--Home page logo-->
            <div class="max-w-[36px]">
                <img src="./assets/github-logo.png" alt = "github-logo">
            </div>
            <h3 class="text-2xl font-semibold">GitHub Issues Tracker</h3>
          </div>
          <div class="flex gap-2 items-center">
            <input
              type="text"
              placeholder="Search issues..."
              class="input input-bordered w-24 md:w-auto"
            />
            <div class="">
              <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
          </div>
        </div>
      </nav>
    </header>
  </body>
</html>
