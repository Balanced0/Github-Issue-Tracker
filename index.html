<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github-Issue-Tracker | Sign in</title>
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!--Font Awesome CDN-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!--DaisyUI + Tailwind-->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC]">
    <section class="container mx-auto px-6 pt-[80px] pb-[80px]">
      <div class="card bg-base-100 max-w-md shadow-md mx-auto">
        <div class="card-body">
          <div class="mb-[24px] flex flex-col justify-center items-center">
            <div>
              <img
                class="mb-[24px]"
                src="./assets/github-logo.png"
                alt="github-logo"
              />
            </div>
            <h3 class="text-2xl font-semibold mb-[4px] text-center">
              GitHub Issues Tracker
            </h3>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
          </div>
          <div>
            <fieldset class="fieldset p-4">
              <label class="label text-black text-base font-medium"
                >Username</label
              >
              <input type="email" class="input w-full" placeholder="Enter Username" />
              <p class="text-[#4A00FF] mb-[16px]">Default: admin</p>

              <label class="label text-black text-base font-medium"
                >Password</label
              >
              <input
                type="password"
                class="input w-full"
                placeholder="Enter Password"
              />
              <p class="text-[#4A00FF] mb-[16px]">Default: admin123</p>

              <button class="btn btn-primary mt-4 mb-[24px]">Sign In</button>
              <div class="flex items-center">
                <div class="flex-grow border-t text-[#E4E4E7]"></div>
                <span class="mx-2 text-base">OR</span>
                <div class="flex-grow border-t text-[#E4E4E7]"></div>
              </div>
            </fieldset>
          </div>
          <p class="text-[#64748B] text-sm text-center mb-[8px]">Demo Credentials:</p>
          <div class="text-center bg-[#F8FAFC] py-6 rounded-lg mx-4">
            <p><span class="font-bold">Username:</span> admin</p>
            <p><span class="font-bold">Password:</span> admin123</p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
